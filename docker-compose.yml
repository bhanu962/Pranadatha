version: '3.8'

services:
  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: bdf-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - mongo_conf:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: blood-donor-finder
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand({ping:1})']
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bdf-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/blood-donor-finder
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (served by nginx) ───────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bdf-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    environment:
      VITE_API_URL: /api
      VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}

volumes:
  mongo_data:
  mongo_conf:
